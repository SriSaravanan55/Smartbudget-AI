[tool.ruff]
line-length = 110
target-version = "py312"
exclude = ["venv", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line length handled loosely; long strings/URLs are fine
    "B008",  # FastAPI's Depends() in argument defaults is the documented DI pattern
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
