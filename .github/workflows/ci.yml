name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        env:
          JWT_SECRET_KEY: ci-test-secret-key
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest --cov=app --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t smartbudget-ai-backend:ci -f Dockerfile .

      - name: Build frontend image
        run: docker build -t smartbudget-ai-frontend:ci -f frontend/Dockerfile frontend
